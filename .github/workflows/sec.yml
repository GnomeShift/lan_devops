name: Security scanning
on:
  workflow_call:
jobs: 
  antivirus: 
    runs-on: ubuntu-latest
    name: Antivirus
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: '0'
    - name: Git AV Scan
      uses: djdefi/gitavscan@main
      with:
        full: '--full'

  lint: 
    runs-on: ubuntu-latest
    name: Lint
