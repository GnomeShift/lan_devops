name: Version update and Docker push pipeline

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - release

env:
  VERSION_FILE: ${{ github.workspace }}/
  RELEASE_BRANCH: release
  MINOR: minor
  PATCH: patch
  VERSION_UPDATE_SCRIPT: .github/workflows/version_up.py
  REPO_NAME: ${{ github.event.repository.name }}
  PR_NUMBER: ${{ github.event.number }}
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
  DOCKER_REPO: ${{ secrets.DOCKERHUB_LOGIN }}/${{ github.repository.name }}
  CHANGELOG_FILE: CHANGELOG.md

jobs:
  print-info:
    name: (INFO) Print info
    runs-on: ubuntu-latest
    steps:
      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@v8.0.1

      - name: Print info about repo
        id: repo-info
        run: |
          echo "EVENT NAME    : ${{ github.event_name }}"
          echo "ACTION        : ${{ github.event.action }}"
          echo "IS TRUE       : ${{ github.event.pull_request.merged }}"
          echo "WORKSPACE      : ${{ github.workspace }}"
          echo "DEFAULT BRANCH: ${{ steps.branch-names.outputs.default_branch }}"
          echo "CURRENT BRANCH: ${{ steps.branch-names.outputs.current_branch }}"
          echo "REF           : ${{ github.ref }}"
          echo "REF NAME      : ${{ github.ref_name }}"

  security:
    name: (SEC)
    permissions:
      pull-requests: write
    needs: print-info
    uses: GnomeShift/lan_devops/.github/workflows/sec.yml@release

  test:
    name: (TEST)
    permissions:
      pull-requests: write
    needs: security
    uses: GnomeShift/lan_devops/.github/workflows/test.yml@release
    with:
      version: alpha

  update-version:
    name: (VER) Update version
    permissions:
      contents: write
      pull-requests: write
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.commit-data.outputs.TAG_MSG }}
    steps:
      - name: Setup Python3
        uses: actions/setup-python@v1
        with:
          python-version: "3.10"

      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@v8

      - name: Checkout on [${{ env.RELEASE_BRANCH }}]
        uses: actions/checkout@v4

      - name: Update version [minor]
        if: startsWith(steps.branch-names.outputs.current_branch,'feature')
        run:
          python3 ${{ env.VERSION_UPDATE_SCRIPT }} ${{ env.VERSION_FILE }} ${{ env.MINOR }}

      - name: Update version [patch]
        if: startsWith(steps.branch-names.outputs.current_branch,'hotfix')
        run:
          python3 ${{ env.VERSION_UPDATE_SCRIPT }} ${{ env.VERSION_FILE }} ${{ env.PATCH }}

      - name: Write version and add commit data
        id: commit-data
        run: |
          COMMIT_MSG=$(python3 ${{ env.VERSION_UPDATE_SCRIPT }} --version_log)
          TAG_MSG=$(python3 ${{ env.VERSION_UPDATE_SCRIPT }} --version)
          echo "COMMIT_MSG=${COMMIT_MSG}" >> $GITHUB_ENV
          echo "TAG_MSG=${TAG_MSG}" >> $GITHUB_ENV
          echo "TAG_MSG=${TAG_MSG}" >> $GITHUB_OUTPUT

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

      - name: Commit and set tag
        run: |
          git add .
          git commit -m "${{ env.COMMIT_MSG }}"
          git tag -a v${{ env.TAG_MSG }} -m "update tag"
          git push -u origin ${{ env.RELEASE_BRANCH }} --tags

      - name: Set version label
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['${{ steps.commit-data.outputs.TAG_MSG }}']
            })

  build:
    name: (CI)
    permissions:
      pull-requests: write
    needs: update-version
    uses: GnomeShift/lan_devops/.github/workflows/build.yml@release

  changelog:
    name: (DOCS) Changelog
    permissions:
      contents: write
      repository-projects: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs: [update-version, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate changelog
        uses: janheinrichmerker/action-github-changelog-generator@v2.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          headerLabel: "# 📑 Changelog"
          breakingLabel: '### 💥 Breaking'
          enhancementLabel: '### 🚀 Enhancements'
          bugsLabel: '### 🐛 Bug fixes'
          deprecatedLabel: '### ⚠️ Deprecations'
          removedLabel: '### 🔥 Removals'
          securityLabel: '### 🛡️ Security'
          issuesLabel: '### 📁 Other issues'
          prLabel: '### 📁 Other pull requests'
          addSections: '{"documentation":{"prefix":"### 📖 Documentation","labels":["documentation"]},"tests":{"prefix":"### ✅ Testing","labels":["tests"]}}'
          dateFormat: "%d.%m.%Y"

      - name: Git pull
        run: |
          git pull

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"

      - name: Commit
        if: success()
        run: |
          git add CHANGELOG.md
          git commit -m "docs: update \`CHANGELOG\`"
          git push -u origin ${{ env.RELEASE_BRANCH }}
      
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CHANGELOG_FILE }}
          path: ${{ env.CHANGELOG_FILE }}

      - name: Set changelog label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['changelog']
            })

  docker-push:
    name: (CI) Docker push
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    needs: [build, update-version]
    env: 
      tag: ${{ needs.update-version.outputs.tag }}
    steps:
      - name: Checkout on [${{ env.RELEASE_BRANCH }}]
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_LOGIN }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker-image to DockerHub
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_LOGIN }}/${{ env.REPO_NAME }}:v${{ env.tag }}

      - name: Set DockerHub label
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['DockerHub']
            })

      - name: Sync repo description with DockerHub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_LOGIN }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ secrets.DOCKERHUB_LOGIN }}/${{ env.REPO_NAME }}
          enable-url-completion: true
          readme-filepath: ./README.md
          short-description: ${{ github.event.repository.description }}

  tg-notify:
    name: (TG) Notify
    needs: [changelog, docker-push, update-version]
    env:
      tag: ${{ needs.update-version.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch names
        id: branch-names
        uses: tj-actions/branch-names@v8

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CHANGELOG_FILE }}

      - name: Get current datetime
        id: get-datetime
        uses: josStorer/get-current-time@v2
        with:
          format: "YY.MM.DD HH:mm:ss"
          timezone: Europe/Moscow

      - name: Send message in TG
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_TO }}
          token: ${{ secrets.TG_TOKEN }}
          format: markdown
          document: ${{ env.CHANGELOG_FILE }}
          message: |
            🆙 Новые изменения!
            
            **GitHub**
            **📁 Репозиторий:** [${{ env.REPO_NAME }}](${{ env.REPO_URL }})
            **✏️ Версия:** [${{ env.tag }}](${{ env.REPO_URL }}/releases/tag/v${{ env.tag }})
            **👤 Автор:** `${{ github.actor }}`
            **📆 Дата и время:** ${{ steps.get-datetime.outputs.formattedTime }}
            **🔢 Номер PR:** [${{ env.PR_NUMBER }}](${{ env.REPO_URL }}/pull/${{ env.PR_NUMBER }})
            
            **DockerHub**
            **👤 Владелец:** [${{ secrets.DOCKERHUB_LOGIN }}](https://hub.docker.com/u/${{ secrets.DOCKERHUB_LOGIN }})
            **✏️ Название:** [${{ env.REPO_NAME }}](https://hub.docker.com/repository/docker/${{ secrets.DOCKERHUB_LOGIN }}/${{ env.REPO_NAME }}/general)

  deploy:
    name: (Deploy)
    permissions:
      contents: write
      pull-requests: write
    needs: [update-version, docker-push]
    uses: GnomeShift/lan_devops/.github/workflows/deploy.yml@release
    with:
      container_name: lan_devops
      version: v${{ needs.update-version.outputs.tag }}
      CHANGELOG_FILE: CHANGELOG.md