apiVersion: apps/v1
kind: Deployment
metadata:
  name: lan-devops-green
  labels:
    app: lan-devops-green
spec:
  replicas: 10
  selector:
    matchLabels:
      app: lan-devops-green
  template:
    metadata:
      name: lan-devops-green
      labels:
        app: lan-devops-green
    spec:
      containers:
        - name: lan-devops-container
          image: gnomeshift/lan_devops:v0.10.0
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "200Mi"
              cpu: "20m"
            requests:
              memory: "100Mi"
              cpu: "10m"